name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (musl = works on ANY linux distro, Alpine, Ubuntu, Arch, etc)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: nion-x86_64-unknown-linux-musl

          # Linux ARM64 (Raspberry Pi, Termux on modern Android)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: nion-aarch64-unknown-linux-musl

          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-latest
            name: nion-x86_64-apple-darwin

          # macOS Apple Silicon (M1/M2/M3)
          - target: aarch64-apple-darwin
            os: macos-latest
            name: nion-aarch64-apple-darwin

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: nion-x86_64-pc-windows-msvc.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # musl toolchain for static Linux binaries
      - name: Install musl-tools (Linux)
        if: contains(matrix.target, 'linux-musl') && matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y musl-tools

      # Cross-compiler for ARM64 Linux
      - name: Install cross-compile tools (ARM64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          OPENSSL_STATIC: '1'

      # Rename binary for upload
      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/nion ${{ matrix.name }}
          chmod +x ${{ matrix.name }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Copy-Item "target/${{ matrix.target }}/release/nion.exe" "${{ matrix.name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  # Create GitHub Release and upload all binaries
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          cat <<'EOF' > release_notes.md
          ## ⚡ Nion ${{ steps.version.outputs.VERSION }}

          ### Installation

          **Linux / macOS / Android (Termux) — one line:**
          ```bash
          curl -sSL https://raw.githubusercontent.com/asikrshoudo/nion-cli/main/install.sh | bash
          ```

          **Manual download:**
          | Platform | File |
          |----------|------|
          | Linux x86_64 | `nion-x86_64-unknown-linux-musl` |
          | Linux ARM64 (Termux) | `nion-aarch64-unknown-linux-musl` |
          | macOS Intel | `nion-x86_64-apple-darwin` |
          | macOS Apple Silicon | `nion-aarch64-apple-darwin` |
          | Windows | `nion-x86_64-pc-windows-msvc.exe` |

          ### Quick Start
          ```bash
          nion config setup    # Add your API keys
          nion chat            # Start chatting
          nion ask "Hello!"    # Quick question
          ```
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "⚡ Nion ${{ steps.version.outputs.VERSION }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
