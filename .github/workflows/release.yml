name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.binary }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: nion-x86_64-linux

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary: nion-aarch64-linux

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: nion-x86_64-macos

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: nion-aarch64-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-

      - name: Install musl-tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y musl-tools

      - name: Install ARM64 cross-linker (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary
        run: cp target/${{ matrix.target }}/release/nion ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}
          retention-days: 1

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries/
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x binaries/*

      - name: Get tag version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Nion ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Nion ${{ steps.version.outputs.VERSION }}

            ### Install (one line)
            ```bash
            curl -sSL https://raw.githubusercontent.com/asikrshoudo/nion-cli/main/install.sh | bash
            ```

            ### Platforms
            | Platform | Binary |
            |----------|--------|
            | Linux x86_64 | `nion-x86_64-linux` |
            | Linux ARM64 / Android Termux | `nion-aarch64-linux` |
            | macOS Intel | `nion-x86_64-macos` |
            | macOS Apple Silicon | `nion-aarch64-macos` |

            ### Quick start
            ```
            nion config setup
            nion chat
            ```
          draft: false
          prerelease: false
          files: binaries/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
